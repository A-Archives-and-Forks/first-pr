  <body class="first-pr">

    <header role="banner">
      <a href="/" aria-label="Go back to the home page"><img class="icon" src="images/icon.svg" alt="logo"></a>
      <h1>First Pull Request</h1>
      <h2>What was the first pull request you sent on GitHub?</h2>
    </header>

    <div role="main" class="content">
      <form id='user-form' action="">
        <label for="login" class="a11y-hidden">Login with Github</label>
        <input id='login' name="login" placeholder="Your GitHub username" class="login-field" data-1p-ignore autocomplete="off">
        <div class="spinner hide">
          <div class="rect1"></div>
          <div class="rect2"></div>
          <div class="rect3"></div>
          <div class="rect4"></div>
          <div class="rect5"></div>
        </div>
        <input text="Go" type="Submit" class="submit-btn">
      </form>
      <div id="main"></div>
    </div>

    <footer role="contentinfo">
      <span class="credit">Made by <a href='https://nesbitt.io'>Andrew</a> and <a href='https://briannelsondesign.com'>Brian</a></span>
